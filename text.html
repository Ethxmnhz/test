<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .document-container {
            background-color: #fff;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .document-container h2 {
            background-color: #000000;
            color: #fff;
            padding: 15px;
            margin: 0;
            font-size: 20px;
        }

        .document-container iframe {
            border: none;
            width: 100%;
            height: 600px;
        }
    </style>
</head>
<body>
    <h1>Document Viewer</h1>

    <div class="document-container">
        <h2>Practical 1</h2>
        <iframe src="exp1.pdf"></iframe>
    </div>
    
    <div class="document-container">
        <h2>Practical 2</h2>
        <iframe src="exp2.pdf"></iframe>
    </div>

    <div class="document-container">
        <h2>Motor Interface</h2>
        <iframe src="motor_interface 3 - Copy.pdf"></iframe>
    </div>

    <div class="document-container">
        <h2>Ultrasonic Sensor Experiment</h2>
        <iframe src="ultrasonic sensor Experiment No 4 - Copy.pdf"></iframe>
    </div>

    <div class="document-container">
        <h2>Stepper Motor</h2>
        <iframe src="stepper motor 5.pdf"></iframe>
    </div>

    <div class="document-container">
        <h2>Relay and Lamp</h2>
        <iframe src="06._Relay_and_lamp.pdf"></iframe>
    </div>

    <div class="document-container">
        <h2>FreeRTOS Basics</h2>
        <iframe src="7 freeRtos.pdf"></iframe>
    </div>

    <div class="document-container">
        <h2>FreeRTOS Multiple Tasks</h2>
        <iframe src="8 freeRtos multiple task.pdf"></iframe>
    </div>

    <!-- Add more document containers for additional documents -->

</body>
</html>
